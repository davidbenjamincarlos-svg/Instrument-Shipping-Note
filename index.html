<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Instrument Shipping Note</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #e9e9e9;
    font-family: Arial, Helvetica, sans-serif;
    color: #000;
}

.form-panel {
    width: min(980px, 95%);
    margin: 22px auto;
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 12px 35px rgba(0,0,0,.12);
}

.form-panel h1 {
    text-align: center;
    margin: 0 0 22px;
    font-size: 26px;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 16px;
}

.field label,
.full label,
.checks > label {
    display: block;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 6px;
}

.field input,
.full textarea {
    width: 100%;
    border: 1px solid #bdbdbd;
    border-radius: 6px;
    padding: 10px;
    font-size: 14px;
}

.full,
.checks,
.instrument-lines-section {
    grid-column: 1 / -1;
}

textarea {
    min-height: 90px;
    resize: vertical;
}

.check-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 9px 20px;
}

.check-grid label {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 14px;
}

.instrument-lines-section {
    border: 1px solid #d7e2f0;
    background: #fbfdff;
    border-radius: 12px;
    padding: 14px;
}

.instrument-lines-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
}

.instrument-line {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 44px;
    gap: 10px;
    align-items: end;
    margin-top: 10px;
}

.instrument-line label {
    display: block;
    font-size: 12px;
    font-weight: 800;
    margin-bottom: 5px;
}

.instrument-line input {
    width: 100%;
    border: 1px solid #bdbdbd;
    border-radius: 6px;
    padding: 10px;
    font-size: 14px;
}

.buttons {
    margin-top: 28px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
}

button {
    border: none;
    padding: 0 22px;
    min-height: 42px;
    margin: 4px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 2px 7px rgba(0,0,0,.12);
}

.btn-preview,
.btn-generate,
.add-instrument-btn {
    background: linear-gradient(180deg, #0d6efd, #0057d8);
    color: #fff;
}

.btn-clear,
.btn-close,
.remove-instrument-btn {
    background: #fff;
    color: #222;
    border: 1px solid #d8d8d8;
}

.remove-instrument-btn {
    height: 40px;
    width: 44px;
    padding: 0;
    color: #dc2626;
    border-color: #fecaca;
    font-size: 20px;
}

.preview-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(15,23,42,.78);
    backdrop-filter: blur(5px);
}

.preview-modal.show {
    display: flex;
    flex-direction: column;
}

.preview-body {
    flex: 1;
    overflow: auto;
    padding: 24px 24px 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
}

.preview-header {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 24px;
    display: flex;
    gap: 14px;
    padding: 12px 16px;
    border-radius: 16px;
    background: rgba(255,255,255,.96);
    box-shadow: 0 12px 35px rgba(0,0,0,.25);
    z-index: 10000;
}

.paper {
    width: 794px;
    height: 1123px;
    min-width: 794px;
    min-height: 1123px;
    max-width: 794px;
    max-height: 1123px;
    background: #fff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 35px rgba(0,0,0,.35);
    padding: 14px 64px 118px;
}

.header {
    display: flex;
    justify-content: center;
    align-items: center;
    border-bottom: 1px solid #000;
    padding: 6px 0 8px;
    height: 72px;
}

.logo-img {
    width: 220px;
    max-height: 52px;
    height: auto;
    display: block;
    object-fit: contain;
}

.ci {
    margin-top: 6px;
    font-size: 12px;
    font-weight: 700;
}

.title {
    text-align: center;
    font-size: 21px;
    font-weight: 900;
    margin: 8px 0 10px;
    letter-spacing: .2px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

.main td {
    border: 1px solid #000;
    padding: 6px 8px;
    font-size: 11px;
    height: 26px;
    vertical-align: top;
    word-break: break-word;
    overflow-wrap: anywhere;
}

.main tr.blue-row td {
    height: 24px;
    padding: 5px 9px;
    border: 1px solid #000;
    background: #67dfe3;
    color: #000;
    font-weight: 900;
    text-transform: uppercase;
}

.main tr.blue-row + tr td {
    border-top: 0;
}

.label {
    width: 33%;
    font-weight: 800;
}

.section {
    margin-top: 15px;
}

.section td {
    border: 1px solid #000;
    padding: 6px 8px;
    font-size: 11px;
    word-break: break-word;
    overflow-wrap: anywhere;
    vertical-align: top;
}

.section-title {
    font-weight: 900;
    text-transform: uppercase;
    background: #67dfe3;
    color: #000;
}

.items {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 11px 20px;
    margin-top: 6px;
}

.item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
}

.box {
    width: 11px;
    height: 11px;
    border: 1px solid #000;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    line-height: 1;
}

.note-text {
    white-space: pre-wrap;
    line-height: 1.16;
    word-break: break-word;
    overflow-wrap: anywhere;
    font-size: 9.2px;
}

.empty-box {
    min-height: 82px;
}

.continue-note {
    font-size: 9.2px;
    font-style: italic;
    margin-left: 8px;
    color: #333;
}

.footer {
    position: absolute;
    left: 28px;
    right: 28px;
    bottom: 42px;
    text-align: center;
    font-size: 10.5px;
    line-height: 1.45;
    font-family: Arial, Helvetica, sans-serif;
    color: #000;
    white-space: nowrap;
    background: #fff;
    padding-top: 6px;
}

.footer .mail,
.footer .web {
    color: #3c9fc0;
}

.footer .web {
    font-weight: 700;
}

.page-number {
    position: absolute;
    right: 36px;
    bottom: 22px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 9.2px;
    color: #000;
    background: #fff;
}

.measure-paper,
.pdf-capture-copy {
    position: fixed !important;
    left: -99999px !important;
    top: 0 !important;
    margin: 0 !important;
    box-shadow: none !important;
    transform: none !important;
    opacity: 0 !important;
    pointer-events: none !important;
}

.pdf-capture-copy {
    opacity: 1 !important;
}

@media(max-width:900px) {
    .form-grid,
    .check-grid,
    .instrument-line {
        grid-template-columns: 1fr;
    }

    .remove-instrument-btn {
        width: 100%;
    }

    .preview-body {
        align-items: flex-start;
    }

    .preview-modal .paper {
        transform: scale(.72);
        transform-origin: top left;
    }

    .preview-header {
        width: calc(100% - 24px);
        border-radius: 14px;
    }

    .preview-header button {
        flex: 1;
        min-width: 0;
    }
}

/* Fill page better before moving to next page */
.note-text {
    font-size: 9.2px !important;
    line-height: 1.16 !important;
}

.section td {
    padding: 6px 8px !important;
}

.paper {
    padding-bottom: 118px !important;
}


/* ---- Improved Webform UI ---- */
body {
    background:
        radial-gradient(circle at top left, rgba(103,223,227,.22), transparent 34%),
        linear-gradient(135deg, #eef6fb 0%, #f7f9fc 45%, #e9edf3 100%) !important;
}

.form-panel {
    max-width: 1080px !important;
    border: 1px solid rgba(15, 23, 42, .08) !important;
    box-shadow: 0 18px 50px rgba(15, 23, 42, .14) !important;
    padding: 30px !important;
}

.form-panel h1 {
    font-size: 30px !important;
    letter-spacing: .2px !important;
    color: #111827 !important;
    padding-bottom: 16px !important;
    border-bottom: 3px solid #67dfe3 !important;
    margin-bottom: 26px !important;
}

.field label,
.full label,
.checks > label {
    color: #111827 !important;
    font-size: 13px !important;
    text-transform: uppercase !important;
    letter-spacing: .3px !important;
}

.field input,
.full textarea,
.instrument-line input {
    border: 1px solid #d6dce6 !important;
    background: #fff !important;
    transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease !important;
}

.field input:focus,
.full textarea:focus,
.instrument-line input:focus {
    outline: none !important;
    border-color: #0d6efd !important;
    box-shadow: 0 0 0 4px rgba(13, 110, 253, .12) !important;
}

.instrument-lines-section {
    background: linear-gradient(180deg, #f8fdff 0%, #ffffff 100%) !important;
    border: 1px solid #cfeef5 !important;
    border-radius: 16px !important;
    padding: 18px !important;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.7), 0 8px 24px rgba(15,23,42,.06) !important;
}

.instrument-lines-top {
    padding-bottom: 12px !important;
    border-bottom: 1px dashed #b9e8ef !important;
}

.instrument-lines-top strong {
    font-size: 15px !important;
    color: #0f172a !important;
    display: inline-flex !important;
    align-items: center !important;
    gap: 8px !important;
}

.instrument-lines-top strong::before {
    content: "🔧";
    font-size: 16px;
}

.instrument-line {
    background: #ffffff !important;
    padding: 12px !important;
    border: 1px solid #e5eaf1 !important;
    border-radius: 12px !important;
    box-shadow: 0 4px 14px rgba(15,23,42,.05) !important;
}

.add-instrument-btn {
    min-width: 210px !important;
    border-radius: 999px !important;
    background: linear-gradient(180deg,#11a8ff,#005bd3) !important;
}

.remove-instrument-btn {
    border-radius: 10px !important;
    box-shadow: none !important;
}

.checks {
    background: #ffffff !important;
    border: 1px solid #e3e8ef !important;
    border-radius: 14px !important;
    padding: 16px !important;
}

.check-grid label {
    background: #f8fafc !important;
    border: 1px solid #e5eaf1 !important;
    border-radius: 10px !important;
    padding: 10px 12px !important;
}

.check-grid input {
    accent-color: #0d6efd;
}

.buttons {
    background: rgba(255,255,255,.72) !important;
    border: 1px solid rgba(15,23,42,.08) !important;
    border-radius: 18px !important;
    padding: 16px !important;
    box-shadow: 0 10px 30px rgba(15,23,42,.08) !important;
}

.btn-preview,
.btn-generate {
    min-width: 150px !important;
    border-radius: 999px !important;
    background: linear-gradient(180deg,#0d6efd,#0057d8) !important;
}

.btn-clear,
.btn-close {
    min-width: 150px !important;
    border-radius: 999px !important;
}

.preview-header {
    border: 1px solid rgba(15,23,42,.10) !important;
}

@media(max-width: 760px) {
    .form-panel {
        padding: 20px !important;
    }

    .instrument-lines-top {
        flex-direction: column !important;
        align-items: stretch !important;
    }

    .add-instrument-btn {
        width: 100% !important;
    }
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.40), transparent 35%),
        linear-gradient(180deg, rgba(255,255,255,.20), rgba(0,35,65,.22));
    z-index: -1;
}

.form-panel {
    background: rgba(255, 255, 255, .93) !important;
    backdrop-filter: blur(14px) saturate(120%) !important;
    border: 1px solid rgba(255, 255, 255, .65) !important;
    box-shadow: 0 24px 70px rgba(0, 30, 60, .28) !important;
}

.form-panel h1 {
    color: #06233f !important;
    text-shadow: 0 1px 0 rgba(255,255,255,.7) !important;
}

.instrument-lines-section,
.checks,
.buttons {
    background: rgba(255, 255, 255, .88) !important;
    backdrop-filter: blur(8px) !important;
}

.field input,
.full textarea,
.instrument-line input {
    background: rgba(255,255,255,.96) !important;
}

.preview-modal {
    background: rgba(7, 21, 38, .78) !important;
}


/* ---- Final frosted glass transparent UI polish ---- */
html, body {
    min-height: 100%;
}

body {
    background-attachment: fixed !important;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
        linear-gradient(90deg, rgba(0,34,69,.22), rgba(255,255,255,.28), rgba(0,34,69,.22)),
        radial-gradient(circle at center top, rgba(255,255,255,.35), transparent 45%);
    z-index: -1;
}

.form-panel {
    width: min(1120px, 94%) !important;
    margin: 34px auto !important;
    background: rgba(255,255,255,.72) !important;
    border: 1px solid rgba(255,255,255,.72) !important;
    border-radius: 24px !important;
    backdrop-filter: blur(20px) saturate(145%) !important;
    -webkit-backdrop-filter: blur(20px) saturate(145%) !important;
    box-shadow:
        0 28px 80px rgba(0, 30, 60, .34),
        inset 0 1px 0 rgba(255,255,255,.70) !important;
}

.form-panel h1 {
    color: #053967 !important;
    font-size: 32px !important;
    font-weight: 900 !important;
    letter-spacing: .6px !important;
    text-transform: uppercase !important;
    border-bottom: 0 !important;
    position: relative !important;
    margin-bottom: 34px !important;
}

.form-panel h1::after {
    content: "";
    display: block;
    width: 180px;
    height: 4px;
    margin: 14px auto 0;
    border-radius: 999px;
    background: linear-gradient(90deg, transparent, #0d6efd, #67dfe3, transparent);
}

.form-grid {
    gap: 18px 20px !important;
}

.field,
.full,
.checks,
.instrument-lines-section {
    filter: drop-shadow(0 8px 18px rgba(10, 45, 80, .07));
}

.field label,
.full label,
.checks > label,
.instrument-lines-top strong {
    color: #063b70 !important;
    font-weight: 900 !important;
}

.field input,
.full textarea,
.instrument-line input {
    background: rgba(255,255,255,.70) !important;
    border: 1px solid rgba(13,110,253,.18) !important;
    border-radius: 12px !important;
    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.8),
        0 4px 14px rgba(0,38,77,.04) !important;
}

.field input:hover,
.full textarea:hover,
.instrument-line input:hover {
    border-color: rgba(13,110,253,.45) !important;
}

.field input:focus,
.full textarea:focus,
.instrument-line input:focus {
    background: rgba(255,255,255,.92) !important;
    border-color: #0d6efd !important;
    box-shadow:
        0 0 0 4px rgba(13,110,253,.13),
        0 8px 24px rgba(13,110,253,.10) !important;
}

.instrument-lines-section,
.checks {
    background: rgba(255,255,255,.58) !important;
    border: 1px solid rgba(255,255,255,.68) !important;
    border-radius: 20px !important;
    backdrop-filter: blur(14px) !important;
    -webkit-backdrop-filter: blur(14px) !important;
}

.instrument-line {
    background: rgba(255,255,255,.62) !important;
    border: 1px solid rgba(13,110,253,.12) !important;
    border-radius: 16px !important;
}

.check-grid label {
    background: rgba(255,255,255,.58) !important;
    border: 1px solid rgba(13,110,253,.13) !important;
    border-radius: 14px !important;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease !important;
}

.check-grid label:hover {
    transform: translateY(-1px);
    border-color: rgba(13,110,253,.42) !important;
    box-shadow: 0 8px 20px rgba(0,35,75,.08) !important;
}

.buttons {
    background: rgba(255,255,255,.54) !important;
    border: 1px solid rgba(255,255,255,.75) !important;
    border-radius: 22px !important;
    backdrop-filter: blur(14px) !important;
    -webkit-backdrop-filter: blur(14px) !important;
}

button {
    transition: transform .18s ease, box-shadow .18s ease, filter .18s ease !important;
}

button:hover {
    transform: translateY(-2px) !important;
    filter: brightness(1.03);
}

.btn-preview,
.btn-generate,
.add-instrument-btn {
    background: linear-gradient(180deg, #1288ff, #005bd3) !important;
    box-shadow: 0 10px 24px rgba(0,91,211,.28) !important;
}

.btn-clear,
.btn-close,
.remove-instrument-btn {

    border: 1px solid rgba(180,190,205,.65) !important;
}

.preview-header {
    background: rgba(255,255,255,.78) !important;

/* =========================================================
   PETROTEC BLUE BRAND UPGRADE - Added by ChatGPT
   Better match for the Petrotec logo and cleaner webform UI
   ========================================================= */
:root{
    --petro-navy:#061b5f;
    --petro-blue:#079ee8;
    --petro-sky:#23b8f2;
    --petro-light:#eaf7ff;
    --petro-line:#12306f;
    --petro-ink:#0f172a;
}

body{
    background:
        radial-gradient(circle at 12% 0%, rgba(35,184,242,.28), transparent 28%),
        radial-gradient(circle at 92% 10%, rgba(6,27,95,.20), transparent 30%),
        linear-gradient(135deg, #f1f8ff 0%, #eef6fb 42%, #dfeaf5 100%) !important;
}

.form-panel{
    max-width:1120px !important;
    border-radius:24px !important;
    border:1px solid rgba(7,158,232,.18) !important;
    background:rgba(255,255,255,.96) !important;
    box-shadow:0 24px 70px rgba(6,27,95,.18) !important;
    padding:30px 34px 32px !important;
    overflow:hidden !important;
    position:relative !important;
}

.form-panel::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:7px;
    background:linear-gradient(90deg,var(--petro-navy),var(--petro-blue),var(--petro-sky));
}

.form-brand{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:18px;
    padding:14px 18px;
    margin:4px 0 22px;
    border:1px solid rgba(7,158,232,.18);
    border-radius:18px;
    background:linear-gradient(135deg,#ffffff 0%,#f4fbff 100%);
    box-shadow:0 10px 28px rgba(6,27,95,.08);
}

.webform-logo-img{
    width:220px;
    max-height:64px;
    object-fit:contain;
    display:block;
}

.form-brand-text{
    text-align:right;
    color:var(--petro-ink);
}

.form-brand-text span{
    display:block;
    font-size:12px;
    font-weight:800;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--petro-blue);
    margin-bottom:4px;
}

.form-brand-text strong{
    display:block;
    font-size:24px;
    font-weight:900;
    color:var(--petro-navy);
    letter-spacing:.2px;
}

.form-panel h1{
    font-size:24px !important;
    text-align:left !important;
    color:var(--petro-navy) !important;
    border-bottom:0 !important;
    padding-bottom:0 !important;
    margin:0 0 18px !important;
}

.form-grid{
    gap:18px 18px !important;
}

.field,
.full,
.checks,
.instrument-lines-section{
    position:relative;
}

.field label,
.full label,
.checks > label,
.instrument-line label{
    color:var(--petro-navy) !important;
    font-size:12px !important;
    font-weight:900 !important;
    letter-spacing:.06em !important;
}

.field input,
.full textarea,
.instrument-line input{
    border:1px solid #d6e6f3 !important;
    border-radius:12px !important;
    background:#fbfdff !important;
    color:var(--petro-ink) !important;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.8) !important;
}

.field input:focus,
.full textarea:focus,
.instrument-line input:focus{
    border-color:var(--petro-blue) !important;
    box-shadow:0 0 0 4px rgba(7,158,232,.14) !important;
}

.instrument-lines-section,
.checks{
    border:1px solid rgba(7,158,232,.22) !important;
    background:linear-gradient(180deg,#f3fbff 0%,#ffffff 100%) !important;
    box-shadow:0 12px 32px rgba(6,27,95,.08) !important;
}

.instrument-lines-top{
    border-bottom:1px dashed rgba(7,158,232,.36) !important;
}

.instrument-lines-top strong{
    color:var(--petro-navy) !important;
}

.instrument-line{
    border:1px solid #dcecf7 !important;
    background:#ffffff !important;
}

.check-grid label{
    border:1px solid #dcecf7 !important;
    background:linear-gradient(180deg,#ffffff,#f8fcff) !important;
    color:var(--petro-ink) !important;
}

.check-grid input{
    accent-color:var(--petro-blue) !important;
}

.btn-preview,
.btn-generate,
.add-instrument-btn{
    background:linear-gradient(180deg,var(--petro-sky),var(--petro-blue) 45%,#006fc8) !important;
    box-shadow:0 10px 22px rgba(7,158,232,.28) !important;
}

.btn-clear,
.btn-close{
    color:var(--petro-navy) !important;
    border:1px solid #cfe2f2 !important;
    box-shadow:0 8px 18px rgba(6,27,95,.10) !important;
}

.preview-modal{
    background:rgba(6,19,42,.82) !important;
}

/* A4 preview / generated PDF color upgrade */
.paper{
    padding-top:10px !important;
    box-shadow:0 12px 38px rgba(6,19,42,.36) !important;
}

.header{
    height:66px !important;
    padding:4px 0 7px !important;
    border-bottom:1.4px solid var(--petro-navy) !important;
}

.logo-img{
    width:210px !important;
    max-height:48px !important;
}

.ci{
    color:#000 !important;
    margin-top:5px !important;
}

.title{
    color:var(--petro-navy) !important;
    font-size:21px !important;
    margin:8px 0 10px !important;
    letter-spacing:.3px !important;
}

.main td,
.section td{
    border-color:var(--petro-line) !important;
}

.main tr.blue-row td,
.section-title{
    background:linear-gradient(90deg,var(--petro-navy) 0%,#0a77bd 48%,var(--petro-sky) 100%) !important;
    color:#ffffff !important;
    border-color:var(--petro-line) !important;
    letter-spacing:.25px !important;
}

.label{
    color:#071b4f !important;
}

.box{
    border-color:var(--petro-navy) !important;
}

.footer .mail,
.footer .web{
    color:var(--petro-blue) !important;
}

@media(max-width:760px){
    .form-brand{
        flex-direction:column;
        align-items:flex-start;
    }
    .form-brand-text{
        text-align:left;
    }
    .webform-logo-img{
        width:190px;
    }
}

</style>

<div class="form-panel">
    <div class="form-brand">
        <img id="webformLogo" class="webform-logo-img" alt="Petrotec Logo">
        <div class="form-brand-text">
            <span></span>
            <strong>Instrument Shipping Note</strong>
        </div>
    </div>

    <h1></h1>

    <div class="form-grid">
        <div class="field">
            <label>CI No.</label>
            <input id="ciNo">
        </div>

        <div class="field">
            <label>Quote Ref Nos.</label>
            <input id="quote">
        </div>

        <div class="field">
            <label>Customer</label>
            <input id="customer">
        </div>

        <div class="field">
            <label>End User</label>
            <input id="enduser">
        </div>

        <div class="instrument-lines-section">
            <div class="instrument-lines-top">
                <strong>Instrument / Model / Serial Details</strong>
                <button type="button" class="add-instrument-btn" id="addInstrumentBtn">+ Add More Instrument</button>
            </div>
            <div id="instrumentLines"></div>
        </div>

        <div class="field">
            <label>Shipping Date</label>
            <input type="date" id="shipdate">
        </div>

        <div class="field">
            <label>Expected Delivery Date</label>
            <input type="date" id="delivery">
        </div>

        <div class="checks">
            <label>Items Included</label>
            <div class="check-grid">
                <label><input type="checkbox" id="pc"> PC</label>
                <label><input type="checkbox" id="chem"> Chemicals</label>
                <label><input type="checkbox" id="spare"> Spare Parts</label>
                <label><input type="checkbox" id="printer"> Printer</label>
                <label><input type="checkbox" id="standard"> Standard Chemicals</label>
                <label><input type="checkbox" id="others"> Others</label>
            </div>
        </div>

        <div class="full">
            <label>Remarks</label>
            <textarea id="remarks"></textarea>
        </div>

        <div class="full">
            <label>Additional Notes</label>
            <textarea id="notes"></textarea>
        </div>
    </div>

    <div class="buttons">
        <button type="button" class="btn-preview" id="previewBtn">👁 Preview</button>
        <button type="button" class="btn-clear" id="clearBtn">🗑 Clear Form</button>
    </div>
</div>

<div class="preview-modal" id="previewModal">
    <div class="preview-header">
        <button type="button" class="btn-generate" id="generatePdfBtn">📄 Generate PDF</button>
        <button type="button" class="btn-close" id="closePreviewBtn">✕ Close</button>
    </div>
    <div class="preview-body" id="previewPages"></div>
</div>

const webformLogoSetFromLogoSrc = document.getElementById("webformLogo");
if (webformLogoSetFromLogoSrc) webformLogoSetFromLogoSrc.src = LOGO_SRC;

function val(id) {
    const el = document.getElementById(id);
    return el ? el.value || "" : "";
}

function esc(value) {
    return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
}

function formatDate(value) {
    if (!value) return "";
    const d = new Date(value + "T00:00:00");
    return String(d.getDate()).padStart(2, "0") + "/" +
           String(d.getMonth() + 1).padStart(2, "0") + "/" +
           d.getFullYear();
}

function checked(id) {
    const el = document.getElementById(id);
    return el && el.checked ? "✓" : "";
}

function addInstrumentLine(instrumentValue = "", modelValue = "", serialValue = "") {
    const container = document.getElementById("instrumentLines");
    if (!container) return;

    const row = document.createElement("div");
    row.className = "instrument-line";
    row.innerHTML = `
        <div>
            <label>Instrument</label>
            <input class="instrument-input" placeholder="Instrument" value="${esc(instrumentValue)}">
        </div>
        <div>
            <label>Model</label>
            <input class="model-input" placeholder="Model" value="${esc(modelValue)}">
        </div>
        <div>
            <label>Serial Number</label>
            <input class="serial-input" placeholder="Serial Number" value="${esc(serialValue)}">
        </div>
        <button type="button" class="remove-instrument-btn">×</button>
    `;

    row.querySelectorAll("input").forEach(function(input) {
        input.addEventListener("input", renderPreview);
    });

    row.querySelector(".remove-instrument-btn").addEventListener("click", function() {
        row.remove();
        if (document.querySelectorAll(".instrument-line").length === 0) {
            addInstrumentLine();
        }
        renderPreview();
    });

    container.appendChild(row);
    renderPreview();
}

function instrumentRows() {
    return Array.from(document.querySelectorAll(".instrument-line")).map(function(row) {
        return {
            instrument: row.querySelector(".instrument-input").value.trim(),
            model: row.querySelector(".model-input").value.trim(),
            serial: row.querySelector(".serial-input").value.trim()
        };
    }).filter(function(row) {
        return row.instrument || row.model || row.serial;
    });
}

function splitAtLimit(text, limit) {
    text = String(text || "").trim();
    if (!text) return ["", ""];
    if (text.length <= limit) return [text, ""];

    let cut = text.lastIndexOf("\n", limit);
    if (cut < limit * 0.55) cut = text.lastIndexOf(" ", limit);
    if (cut < limit * 0.55) cut = limit;

    return [text.slice(0, cut).trim(), text.slice(cut).trim()];
}

function pageShell(content, pageNo, totalPages) {
    return `
        <div class="paper">
            <div class="header">
                <img class="logo-img" src="${LOGO_SRC}" alt="Petrotec Logo">
            </div>

            <div class="ci">CI NO: ${esc(val("ciNo"))}</div>

            ${pageNo === 1 ? '<div class="title">INSTRUMENT SHIPPING NOTE</div>' : ''}

            ${content}

            <div class="footer">
                Dubai Airport Freezone LIU B03 | Formed Pursuant to law no. 2 of 1996 with limited Liability | Trade License 2988<br>
                P.O. Box 371137, Dubai, UAE &nbsp;&nbsp; Tel. +971 4 2323 355 | Fax. +971 4 2323 356 &nbsp;&nbsp; emails.
                <span class="mail">sales@petro-technologies.com</span><br>
                <span class="web">www.petro-technologies.com</span>
            </div>

            <div class="page-number">Page ${pageNo} of ${totalPages}</div>
        </div>
    `;
}

function itemsContent() {
    return `
        <table class="section">
            <tr><td class="section-title">CHECK OUT THOSE THAT ARE INCLUDED IN THE SHIPMENT</td></tr>
            <tr>
                <td>
                    <div class="items">
                        <div class="item"><span class="box">${checked("pc")}</span> PC</div>
                        <div class="item"><span class="box">${checked("chem")}</span> CHEMICALS</div>
                        <div class="item"><span class="box">${checked("spare")}</span> SPARE PARTS</div>
                        <div class="item"><span class="box">${checked("printer")}</span> PRINTER</div>
                        <div class="item"><span class="box">${checked("standard")}</span> STANDARD CHEMICALS</div>
                        <div class="item"><span class="box">${checked("others")}</span> OTHERS</div>
                    </div>
                </td>
            </tr>
        </table>
    `;
}

function detailsTable(rows, includeMainInfo, continued) {
    const instrument = rows.map(item => item.instrument).filter(Boolean).join("\n");
    const model = rows.map(item => item.model).filter(Boolean).join("\n");
    const serial = rows.map(item => item.serial).filter(Boolean).join("\n");

    let html = `
        <table class="main">
            <tr class="blue-row"><td colspan="2">${continued ? "DETAILS (CONTINUED)" : "DETAILS"}</td></tr>
    `;

    if (includeMainInfo) {
        html += `
            <tr><td class="label">QUOTE REF NOS.:</td><td>${esc(val("quote"))}</td></tr>
            <tr><td class="label">CUSTOMER:</td><td>${esc(val("customer"))}</td></tr>
            <tr><td class="label">END USER:</td><td>${esc(val("enduser"))}</td></tr>
        `;
    }

    html += `
            <tr><td class="label">INSTRUMENT:</td><td><div class="note-text">${esc(instrument)}</div></td></tr>
            <tr><td class="label">MODEL:</td><td><div class="note-text">${esc(model)}</div></td></tr>
            <tr><td class="label">SERIAL NUMBER:</td><td><div class="note-text">${esc(serial)}</div></td></tr>
    `;

    if (includeMainInfo) {
        html += `
            <tr><td class="label">SHIPPING DATE:</td><td>${formatDate(val("shipdate"))}</td></tr>
            <tr><td class="label">EXPECTED DELIVERY DATE:</td><td>${formatDate(val("delivery"))}</td></tr>
        `;
    }

    html += `</table>`;
    return html;
}

function textSection(title, text, continued) {
    const emptyClass = text ? "" : " empty-box";
    return `
        <table class="section">
            <tr>
                <td class="section-title">${title}${continued ? ' <span class="continue-note">(CONTINUED)</span>' : ''}</td>
            </tr>
            <tr>
                <td><div class="note-text${emptyClass}">${esc(text)}</div></td>
            </tr>
        </table>
    `;
}

function contentFits(content, pageNo, totalPages) {
    const wrapper = document.createElement("div");
    wrapper.className = "measure-paper";
    wrapper.innerHTML = pageShell(content, pageNo || 1, totalPages || 1);
    document.body.appendChild(wrapper);

    const footer = wrapper.querySelector(".footer");
    const contentBlocks = wrapper.querySelectorAll(".main, .section");
    let fits = true;

    if (footer && contentBlocks.length) {
        const footerTop = footer.getBoundingClientRect().top;
        const lastBlock = contentBlocks[contentBlocks.length - 1];
        const lastBottom = lastBlock.getBoundingClientRect().bottom;
        fits = lastBottom <= footerTop - 12;
    }

    document.body.removeChild(wrapper);
    return fits;
}

function splitTextSmart(text, title, continued, baseContent, pageNo) {
    text = String(text || "").trim();

    if (!text) {
        const section = textSection(title, "", continued);
        return { part: "", rest: "", html: section };
    }

    if (contentFits(baseContent + textSection(title, text, continued), pageNo, pageNo)) {
        return { part: text, rest: "", html: textSection(title, text, continued) };
    }

    let low = 1;
    let high = text.length;
    let best = 1;

    while (low <= high) {
        let mid = Math.floor((low + high) / 2);
        let candidate = text.slice(0, mid);
        let cut = Math.max(candidate.lastIndexOf("\n"), candidate.lastIndexOf(" "));
        if (cut > mid * 0.65) candidate = candidate.slice(0, cut);

        if (contentFits(baseContent + textSection(title, candidate.trim(), continued), pageNo, pageNo)) {
            best = candidate.length;
            low = mid + 1;
        } else {
            high = mid - 1;
        }
    }

    let part = text.slice(0, best);
    let cut = Math.max(part.lastIndexOf("\n"), part.lastIndexOf(" "));
    if (cut > best * 0.65) part = part.slice(0, cut);
    part = part.trim();

    if (!part) part = text.slice(0, Math.max(1, best)).trim();

    return {
        part: part,
        rest: text.slice(part.length).trim(),
        html: textSection(title, part, continued)
    };
}

function buildDetailsPages() {
    const rows = instrumentRows();
    const pages = [];

    if (rows.length === 0) {
        pages.push(detailsTable([], true, false));
        return pages;
    }

    let index = 0;
    let pageNo = 1;
    let includeMainInfo = true;

    while (index < rows.length) {
        let low = 1;
        let high = rows.length - index;
        let best = 1;

        while (low <= high) {
            const mid = Math.floor((low + high) / 2);
            const candidateRows = rows.slice(index, index + mid);
            const candidate = detailsTable(candidateRows, includeMainInfo, pageNo > 1);

            if (contentFits(candidate, pageNo, pageNo)) {
                best = mid;
                low = mid + 1;
            } else {
                high = mid - 1;
            }
        }

        pages.push(detailsTable(rows.slice(index, index + best), includeMainInfo, pageNo > 1));
        index += best;
        includeMainInfo = false;
        pageNo++;
    }

    return pages;
}

function buildPageContents() {
    const pages = [];
    const detailPages = buildDetailsPages();

    for (let i = 0; i < detailPages.length - 1; i++) {
        pages.push(detailPages[i]);
    }

    let currentPage = detailPages[detailPages.length - 1] || detailsTable([], true, false);

    if (contentFits(currentPage + itemsContent(), pages.length + 1, pages.length + 1)) {
        currentPage += itemsContent();
    } else {
        pages.push(currentPage);
        currentPage = itemsContent();
    }

    let remarks = val("remarks").trim();
    let notes = val("notes").trim();

    if (!contentFits(currentPage + textSection("REMARKS", remarks ? "x" : "", false), pages.length + 1, pages.length + 1)) {
        pages.push(currentPage);
        currentPage = "";
    }

    let remarkFit = splitTextSmart(remarks, "REMARKS", false, currentPage, pages.length + 1);
    currentPage += remarkFit.html;
    remarks = remarkFit.rest;

    if (!remarks) {
        if (!contentFits(currentPage + textSection("ADDITIONAL NOTES", notes ? "x" : "", false), pages.length + 1, pages.length + 1)) {
            pages.push(currentPage);
            currentPage = "";
        }

        let noteFit = splitTextSmart(notes, "ADDITIONAL NOTES", false, currentPage, pages.length + 1);
        currentPage += noteFit.html;
        notes = noteFit.rest;
    }

    pages.push(currentPage);

    while (remarks) {
        let page = "";
        let r = splitTextSmart(remarks, "REMARKS", true, page, pages.length + 1);
        page += r.html;
        remarks = r.rest;

        if (!remarks) {
            if (!contentFits(page + textSection("ADDITIONAL NOTES", notes ? "x" : "", false), pages.length + 1, pages.length + 1)) {
                pages.push(page);
                page = "";
            }

            let n = splitTextSmart(notes, "ADDITIONAL NOTES", false, page, pages.length + 1);
            page += n.html;
            notes = n.rest;
        }

        pages.push(page);
    }

    let notesContinued = pages.some(function(page) {
        return page.includes("ADDITIONAL NOTES");
    });

    while (notes) {
        let page = "";
        let n = splitTextSmart(notes, "ADDITIONAL NOTES", notesContinued, page, pages.length + 1);
        page += n.html;
        notes = n.rest;
        notesContinued = true;
        pages.push(page);
    }

    return pages.filter(function(page) {
        return String(page || "").trim() !== "";
    });
}

function renderPreview() {
    const previewPages = document.getElementById("previewPages");
    if (!previewPages) return;

    const contents = buildPageContents();
    const total = contents.length || 1;

    previewPages.innerHTML = contents.map(function(content, index) {
        return pageShell(content, index + 1, total);
    }).join("");
}

function showPreview() {
    renderPreview();
    document.getElementById("previewModal").classList.add("show");
}

function closePreview() {
    document.getElementById("previewModal").classList.remove("show");
}

async function waitForImages(element) {
    const images = Array.from(element.querySelectorAll("img"));
    await Promise.all(images.map(function(img) {
        if (img.complete) return Promise.resolve();
        return new Promise(function(resolve) {
            img.onload = resolve;
            img.onerror = resolve;
        });
    }));
}

async function generatePDF() {
    renderPreview();

    const pages = Array.from(document.querySelectorAll(".paper"));
    const jsPDF = window.jspdf.jsPDF;
    const pdf = new jsPDF({
        orientation: "portrait",
        unit: "mm",
        format: "a4",
        compress: true
    });

    for (let i = 0; i < pages.length; i++) {
        const clone = pages[i].cloneNode(true);
        clone.classList.add("pdf-capture-copy");
        document.body.appendChild(clone);

        await waitForImages(clone);

        const canvas = await html2canvas(clone, {
            scale: 2,
            useCORS: true,
            allowTaint: true,
            backgroundColor: "#ffffff",
            width: 794,
            height: 1123,
            windowWidth: 794,
            windowHeight: 1123,
            scrollX: 0,
            scrollY: 0,
            x: 0,
            y: 0
        });

        const imgData = canvas.toDataURL("image/jpeg", 1.0);

        if (i > 0) pdf.addPage();
        pdf.addImage(imgData, "JPEG", 0, 0, 210, 297);

        document.body.removeChild(clone);
    }

    const ci = val("ciNo").trim();
    pdf.save(ci ? "Instrument-Shipping-Note-" + ci + ".pdf" : "Instrument-Shipping-Note.pdf");
}

function clearForm() {
    document.querySelectorAll("input, textarea").forEach(function(el) {
        if (el.type === "checkbox") {
            el.checked = false;
        } else {
            el.value = "";
        }
    });

    const lines = document.getElementById("instrumentLines");
    lines.innerHTML = "";
    addInstrumentLine();
    renderPreview();
}

function bindEvents() {
    document.getElementById("addInstrumentBtn").addEventListener("click", function() {
        addInstrumentLine();
    });

    document.getElementById("previewBtn").addEventListener("click", showPreview);
    document.getElementById("clearBtn").addEventListener("click", clearForm);
    document.getElementById("generatePdfBtn").addEventListener("click", generatePDF);
    document.getElementById("closePreviewBtn").addEventListener("click", closePreview);

    document.querySelectorAll("input, textarea").forEach(function(el) {
        el.addEventListener("input", renderPreview);
        el.addEventListener("change", renderPreview);
    });

    document.addEventListener("keydown", function(e) {
        if (e.key === "Escape") closePreview();
    });
}

window.addEventListener("DOMContentLoaded", function() {
    bindEvents();
    addInstrumentLine();
    renderPreview();
});
</script>
